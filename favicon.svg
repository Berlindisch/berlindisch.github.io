<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2E88"/>
      <stop offset="100%" stop-color="#FFD84D"/>
    </linearGradient>
    <!-- Mask to cut out the B -->
    <mask id="cutout">
      <rect width="256" height="256" fill="white"/>
      <text x="128" y="158"
            text-anchor="middle"
            font-family="Arial, Helvetica, sans-serif"
            font-size="120"
            font-weight="700"
            fill="black">B</text>
    </mask>
  </defs>

  <!-- Honeycomb hexagon with gradient fill and B cutout -->
  <polygon
    points="128,24 210,72 210,184 128,232 46,184 46,72"
    fill="url(#grad)"
    mask="url(#cutout)"
  />
</svg>
